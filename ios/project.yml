name: OpenWearables
options:
  bundleIdPrefix: com.openwearables
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

configs:
  Debug: debug
  Release: release

targets:
  OpenWearables:
    type: application
    platform: iOS
    sources:
      - OpenWearables
    settings:
      base:
        INFOPLIST_FILE: OpenWearables/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openwearables.ios
      configs:
        Debug:
          API_BASE_URL: "http://localhost:8000"
        Release:
          API_BASE_URL: "https://api.openwearables.example.com"
    info:
      path: OpenWearables/Info.plist
      properties:
        CFBundleDisplayName: Open Wearables
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        API_BASE_URL: "$(API_BASE_URL)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  OpenWearablesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OpenWearablesTests
    dependencies:
      - target: OpenWearables
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenWearables.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OpenWearables"
        BUNDLE_LOADER: "$(TEST_HOST)"
